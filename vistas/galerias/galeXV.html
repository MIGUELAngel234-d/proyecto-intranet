<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de 15 Años</title>

    
    <!-- Hoja de estilos específica de las galerias -->
    <link rel="stylesheet" href="../../estilos/galeria.css">
</head>

<body class="galeria-page">

    <!-- Titulo de la galeria XV Años-->
    <h1 class="titulos">XV Años</h1>

    <div class="container">
        <!--Imagagenes de la galeria de 15años-->
        <div class="box">
            <img src="../../recursos/imagenes/galeria/15años/15A (1).webp" alt="15años 1" loading="lazy"
                class="foto-amplia">
        </div>

        <div class="box">
            <img src="../../recursos/imagenes/galeria/15años/15A (2).webp" alt="15años 2" loading="lazy"
                class="foto-amplia">
        </div>

        <div class="box">
            <img src="../../recursos/imagenes/galeria/15años/15A (3).webp" alt="15años 3" loading="lazy"
                class="foto-amplia">
        </div>

        <div class="box">
            <img src="../../recursos/imagenes/galeria/15años/15A (4).webp" alt="15años 4" loading="lazy"
                class="foto-amplia">
        </div>

        <div class="box">
            <img src="../../recursos/imagenes/galeria/15años/15A (5).webp" alt="15años 5" loading="lazy"
                class="foto-amplia">
        </div>

        <div class="box">
            <img src="../../recursos/imagenes/galeria/15años/15A (6).webp" alt="15años 6" loading="lazy"
                class="foto-amplia">
        </div>

    </div>

    <!-- 
    ============
    MODAL DEL LIGHTBOX (CAJA DE LUZ)
    ==============
    -->
    <div id="lightbox" class="lightbox">
        <!-- BOTÓN X PARA CERRAR -->
        <span class="btn-cerrar">&times;</span>

        <!-- BOTÓN PARA FOTO ANTERIOR -->
        <button class="btn-nav btn-prev">&#10094;</button>

        <!-- FOTO GRANDE -->
        <img class="lightbox-contenido" id="img-modal" src="" alt="Imagen ampliada">

        <!-- BOTÓN PARA FOTO SIGUIENTE -->
        <button class="btn-nav btn-next">&#10095;</button>
    </div>
    <!-- FIN DEL MODAL DEL LIGHTBOX -->

    <!-- Script externo para manejar el Lightbox y sus animaciones -->
    <script src="../../scripts/galeria.js"></script>
</body>

</html>
