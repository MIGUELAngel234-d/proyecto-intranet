<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - Intranet UAMI</title>
    <link rel="stylesheet" href="/estilos/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-gradient"></div>

    <main class="login-container">
        <div class="glass-card login-box animate-slide-up">
            
            <div class="login-header">
                <img src="/recursos/imagenes/logos/UAM.png" alt="Logo UAM" class="login-logo">
                <h2>Panel de Administración</h2>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <form action="/cgi-bin/login.py" method="POST" class="login-form">
                
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ej. admin_uami" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Iniciar Sesión</button>
                
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link">← Volver al sitio principal</a>
            </div>

        </div>
    </main>
</body>
</html>
